services:
  - type: web
    name: incumbent-derby
    runtime: docker
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        # Free tier has ephemeral disk — add a Render Persistent Disk at
        # /data and set this to sqlite:////data/derby.db, or switch to a
        # managed Postgres instance by setting a postgres:// URL here.
        value: sqlite:///./backend/derby.db
